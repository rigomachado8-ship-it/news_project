{% extends "base.html" %}

{% block title %}Delete Profile{% endblock %}

{% block content %}
<div class="card">
    <h1>Delete Profile</h1>
    <p>Are you sure you want to delete the profile for <strong>{{ profile_user.username }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button class="btn btn-danger" type="submit">Yes, Delete Profile</button>
            <a class="btn btn-secondary" href="{% url 'profile_detail' profile_user.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
