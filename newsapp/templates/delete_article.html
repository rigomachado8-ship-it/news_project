{% extends "base.html" %}

{% block title %}Delete Article{% endblock %}

{% block content %}
<div class="form-card">
    <h1 class="page-title">Delete Article</h1>
    <p>
        Are you sure you want to delete <strong>{{ article.title }}</strong>?
    </p>
    <p class="muted">
        Journalists may only delete their own articles before editor approval.
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button class="btn btn-danger" type="submit">Yes, Delete</button>
            <a class="btn btn-secondary" href="{% url 'article_detail' article.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
