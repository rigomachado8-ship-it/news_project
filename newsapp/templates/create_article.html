{% extends "base.html" %}

{% block title %}Create Article{% endblock %}

{% block content %}
<div class="form-card">
    <h1 class="page-title">Create Article</h1>
    <p class="muted">
        Journalists can save drafts or submit for review. Editors can also publish approved content.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit">Save Article</button>
            <a class="btn btn-secondary" href="{% url 'dashboard' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
