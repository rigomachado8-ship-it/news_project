{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="card">
    <h1>Edit Profile</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit">Save Changes</button>
            <a class="btn btn-secondary" href="{% url 'profile_detail' profile_user.pk %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
