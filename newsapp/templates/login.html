{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="form-card">
    <h1 class="page-title">Login</h1>
    <p class="muted">Sign in to manage articles, profiles, and subscriptions.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit">Login</button>
            <a class="btn btn-secondary" href="{% url 'register' %}">Create Account</a>
        </div>
    </form>
</div>
{% endblock %}
