{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<div class="card">
    <h1>Profile</h1>

    <p><strong>Username:</strong> {{ profile_user.username }}</p>
    <p><strong>Email:</strong> {{ profile_user.email }}</p>
    <p><strong>Role:</strong> {{ profile_user.get_role_display }}</p>

    <div class="actions">
        <a class="btn btn-primary" href="{% url 'profile_update' profile_user.pk %}">Edit Profile</a>
        <a class="btn btn-danger" href="{% url 'profile_delete' profile_user.pk %}">Delete Profile</a>
    </div>
</div>
{% endblock %}
